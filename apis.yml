aid: ogilvy
name: Ogilvy
description: >-
  Ogilvy is a global advertising, marketing, and communications agency network
  founded by David Ogilvy in 1948 and headquartered in New York City. It is a
  WPP company (NASDAQ: WPPGY) operating across roughly 132 offices in 83
  countries (per ogilvy.com/about; WPP cites 128 offices in 88 countries) with
  approximately 17,500 employees (per Wikipedia, as of 2022). The network
  positions itself around "Borderless Creativity," innovating at the
  intersections of five core capabilities: Advertising, Public Relations &
  Influence, Consulting, Relationship Design (OgilvyOne), and Health. Ogilvy
  was named Cannes Lions Network of the Year in 2022 and 2024, D&AD Network
  of the Year in 2020, and took Network of the Year at The One Show 2026.
  Long-standing client work includes Coca-Cola, Dove (Campaign for Real
  Beauty), IBM, American Express, IKEA, Hellmann's, Unilever, KFC, and
  Cadbury. Ogilvy does not publish a developer portal, public REST APIs,
  OpenAPI specifications, SDKs, status page, changelog, or pricing — its
  product is creative work delivered to brand clients, not software offered
  to developers. There is no `github.com/Ogilvy` organization. This
  repository indexes the public properties (homepage, capabilities, work,
  ideas/blog, parent company, regional sites, and notable sub-brands) so the
  API Evangelist network can track the absence of a developer surface and
  link Ogilvy to its parent WPP and to its practice-area brands (Ogilvy
  Health, OgilvyOne, Ogilvy PR, Ogilvy Consulting).
